<svg xmlns="http://www.w3.org/2000/svg" width="760" height="172" viewBox="0 0 760 172" role="img" aria-labelledby="title desc">
  <title id="title">Supported source nodes</title>
  <desc id="desc">Node-style badges for Dataverse Input, Dataverse View, CSV Input, XLSX Input, SQL Input, and Manual Data.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-20%" width="116%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .card{fill:#1a1d2b;stroke:#065f46;stroke-opacity:.55;stroke-width:1.2;filter:url(#shadow)}
      .head{fill:#047857;fill-opacity:.72}
      .icon{fill:#d1fae5}
      .name{fill:#f8fafc;font:600 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
      .type{fill:#bbf7d0;font:700 9px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;letter-spacing:1px}
      .body{fill:#94a3b8;font:500 11px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
      .handle{fill:#22c55e;stroke:#0f1117;stroke-width:4}
    </style>
  </defs>
  <rect width="760" height="172" rx="14" fill="#0f1117"/>
  <g transform="translate(20 18)">
    <g>
      <rect class="card" width="220" height="58" rx="12"/>
      <rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M15 9h12c4 0 7 2 7 5s-3 5-7 5H15c-4 0-7-2-7-5s3-5 7-5zm0 3c-2 0-4 1-4 2s2 2 4 2h12c2 0 4-1 4-2s-2-2-4-2H15z"/>
      <text class="name" x="43" y="20">Dataverse Input</text>
      <text class="type" x="145" y="21">DATAVERSE</text>
      <text class="body" x="12" y="47">Fetch rows from Dataverse</text>
    </g>
    <g transform="translate(260 0)">
      <rect class="card" width="220" height="58" rx="12"/>
      <rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M10 10h17v4H10zm0 7h17v4H10zm0 7h17v4H10zm22-14h4v18h-4z"/>
      <text class="name" x="43" y="20">Dataverse View</text>
      <text class="type" x="158" y="21">VIEW</text>
      <text class="body" x="12" y="47">Saved Power Platform view</text>
    </g>
    <g transform="translate(500 0)">
      <rect class="card" width="220" height="58" rx="12"/>
      <rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M11 8h20l6 6v17H11zm18 2v6h6"/>
      <text class="name" x="43" y="20">CSV Input</text>
      <text class="type" x="157" y="21">CSV</text>
      <text class="body" x="12" y="47">Upload a CSV file</text>
    </g>
    <g transform="translate(0 78)">
      <rect class="card" width="220" height="58" rx="12"/>
      <rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M10 9h24v20H10zm6 0v20M10 15h24M10 22h24"/>
      <text class="name" x="43" y="20">XLSX Input</text>
      <text class="type" x="153" y="21">XLSX</text>
      <text class="body" x="12" y="47">Upload an Excel workbook</text>
    </g>
    <g transform="translate(260 78)">
      <rect class="card" width="220" height="58" rx="12"/>
      <rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M11 10h26v17H11zm4 4h18M15 19h10"/>
      <text class="name" x="43" y="20">SQL Input</text>
      <text class="type" x="157" y="21">SQL</text>
      <text class="body" x="12" y="47">Query a SQL database</text>
    </g>
    <g transform="translate(500 78)">
      <rect class="card" width="220" height="58" rx="12"/>
      <rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M12 29l4-1 16-16 3 3-16 16-7 2z"/>
      <text class="name" x="43" y="20">Manual Data</text>
      <text class="type" x="144" y="21">MANUAL</text>
      <text class="body" x="12" y="47">Type rows by hand</text>
    </g>
  </g>
</svg>
