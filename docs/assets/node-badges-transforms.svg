<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" role="img" aria-labelledby="title desc">
  <title id="title">Supported transform nodes</title>
  <desc id="desc">Node-style badges for Select Columns, Select / Map, Filter, Transform, Deduplicate, Random Sample, Preview, Preview Columns, and Field Usage.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-20%" width="116%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .card{fill:#1a1d2b;stroke:#475569;stroke-opacity:.7;stroke-width:1.2;filter:url(#shadow)}
      .head{fill:#475569;fill-opacity:.76}
      .icon{fill:#e2e8f0}
      .name{fill:#f8fafc;font:600 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
      .type{fill:#cbd5e1;font:700 9px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;letter-spacing:1px}
      .body{fill:#94a3b8;font:500 11px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}
      .handle{fill:#94a3b8;stroke:#0f1117;stroke-width:4}
    </style>
  </defs>
  <rect width="760" height="250" rx="14" fill="#0f1117"/>
  <g transform="translate(20 18)">
    <g>
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M10 9h5v22h-5zm9 0h5v22h-5zm9 0h5v22h-5z"/>
      <text class="name" x="43" y="20">Select Columns</text><text class="type" x="151" y="21">KEEP</text>
      <text class="body" x="12" y="47">Keep only chosen columns</text>
    </g>
    <g transform="translate(260 0)">
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M10 15h22l-5-5 2-2 9 8-9 8-2-2 5-5H10zm28 13H16l5 5-2 2-9-8 9-8 2 2-5 5h22z"/>
      <text class="name" x="43" y="20">Select / Map</text><text class="type" x="146" y="21">MAP</text>
      <text class="body" x="12" y="47">Map source to target fields</text>
    </g>
    <g transform="translate(500 0)">
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M10 10h28l-11 12v8l-6 3v-11z"/>
      <text class="name" x="43" y="20">Filter</text><text class="type" x="151" y="21">WHERE</text>
      <text class="body" x="12" y="47">Keep matching rows</text>
    </g>
    <g transform="translate(0 78)">
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M14 30l10-21 4 11 11 4-21 10 2-9z"/>
      <text class="name" x="43" y="20">Transform</text><text class="type" x="134" y="21">CLEAN</text>
      <text class="body" x="12" y="47">Clean and reformat fields</text>
    </g>
    <g transform="translate(260 78)">
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M12 13h18v16H12zm6-5h18v16h-4V12H18z"/>
      <text class="name" x="43" y="20">Deduplicate</text><text class="type" x="144" y="21">UNIQUE</text>
      <text class="body" x="12" y="47">Remove duplicate rows</text>
    </g>
    <g transform="translate(500 78)">
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M13 16h8l13 13h5l-5 5-5-5h4L20 18h-7zm16 0h4l-4 4 3 3 7-7-7-7-3 3h-4z"/>
      <text class="name" x="43" y="20">Random Sample</text><text class="type" x="161" y="21">N</text>
      <text class="body" x="12" y="47">Grab N random rows</text>
    </g>
    <g transform="translate(0 156)">
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M10 20c6-8 19-8 25 0-6 8-19 8-25 0zm13-5a5 5 0 100 10 5 5 0 000-10z"/>
      <text class="name" x="43" y="20">Preview</text><text class="type" x="140" y="21">VIEW</text>
      <text class="body" x="12" y="47">Inspect rows; pass through</text>
    </g>
    <g transform="translate(260 156)">
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M10 10h26v20H10zm0 6h26M18 10v20M27 10v20"/>
      <text class="name" x="43" y="20">Preview Columns</text><text class="type" x="163" y="21">TYPES</text>
      <text class="body" x="12" y="47">Show column names and types</text>
    </g>
    <g transform="translate(500 156)">
      <rect class="card" width="220" height="58" rx="12"/><rect class="head" width="220" height="30" rx="12"/><path class="head" d="M0 18h220v12H0z"/>
      <circle class="handle" cx="0" cy="29" r="7"/><circle class="handle" cx="220" cy="29" r="7"/>
      <path class="icon" d="M12 29h5V18h-5zm9 0h5V11h-5zm9 0h5V15h-5z"/>
      <text class="name" x="43" y="20">Field Usage</text><text class="type" x="145" y="21">STATS</text>
      <text class="body" x="12" y="47">Fill rate, unique count, types</text>
    </g>
  </g>
</svg>
